apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-agent
  namespace: prefect
  labels:
    app: prefect-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-agent
  template:
    metadata:
      labels:
        app: prefect-agent
    spec:
      serviceAccountName: prefect
      containers:
      - name: prefect-agent
        image: prefecthq/prefect:2-latest
        command: 
        - sh
        - -c
        - |
          # Wait for server to be ready using Python (no curl needed)
          echo "Waiting for Prefect server to be ready..."
          python3 -c "
          import time
          import sys
          try:
              from prefect.client import get_client
              max_retries = 30
              for i in range(max_retries):
                  try:
                      with get_client(sync_client=True) as client:
                          client.api.health_check()
                      print('Server is ready!')
                      sys.exit(0)
                  except Exception as e:
                      print(f'Server not ready yet (attempt {i+1}/{max_retries}), sleeping...: {e}')
                      time.sleep(5)
              print('Server failed to become ready')
              sys.exit(1)
          except Exception as e:
              print(f'Error checking server health: {e}')
              print('Starting agent anyway...')
              sys.exit(0)
          "
          
          # Start the agent with default work queue
          echo "Starting Prefect agent..."
          prefect agent start -q default
        env:
        - name: PREFECT_API_URL
          value: "http://prefect-server:4200/api"
        - name: PREFECT_LOGGING_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
