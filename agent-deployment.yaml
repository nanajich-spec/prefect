apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-agent
  namespace: prefect
  labels:
    app: prefect-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-agent
  template:
    metadata:
      labels:
        app: prefect-agent
    spec:
      serviceAccountName: prefect
      containers:
      - name: prefect-agent
        image: prefecthq/prefect:2-latest
        command: 
        - prefect
        - agent
        - start
        - -q
        - default
        env:
        - name: PREFECT_API_URL
          value: "http://prefect-server:4200/api"
        - name: PREFECT_LOGGING_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
