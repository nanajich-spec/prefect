apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-agent
  namespace: prefect
  labels:
    app: prefect-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-agent
  template:
    metadata:
      labels:
        app: prefect-agent
    spec:
      serviceAccountName: prefect
      containers:
      - name: prefect-agent
        image: prefecthq/prefect:2.20.25-python3.10
        command:
        - sh
        - -c
        - |
          # Wait for server using Python
          echo "Waiting for Prefect server..."
          python3 << 'PYEOF'
          import time
          import urllib.request
          import urllib.error
          
          max_attempts = 60
          for i in range(max_attempts):
              try:
                  with urllib.request.urlopen('http://prefect-server:4200/api/health', timeout=2) as response:
                      if response.read().decode().strip() == 'true':
                          print(f"✅ Server is ready!")
                          exit(0)
              except Exception as e:
                  print(f"⏳ Waiting for server (attempt {i+1}/{max_attempts})...")
                  time.sleep(5)
          
          print("⚠️ Server not ready, but starting agent anyway...")
          PYEOF
          
          # Start agent
          echo "🚀 Starting Prefect Agent..."
          prefect agent start -q default
        env:
        - name: PREFECT_API_URL
          value: "http://prefect-server:4200/api"
        - name: PREFECT_LOGGING_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
