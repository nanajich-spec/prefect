apiVersion: v1
kind: Service
metadata:
  name: prefect-postgres
  namespace: prefect
spec:
  selector:
    app: prefect-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-postgres
  namespace: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-postgres
  template:
    metadata:
      labels:
        app: prefect-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "prefect"
        - name: POSTGRES_PASSWORD
          value: "prefect123"
        - name: POSTGRES_DB
          value: "prefect"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: prefect-postgres-pvc
