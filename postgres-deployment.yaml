apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-postgres
  namespace: prefect
  labels:
    app: prefect-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-postgres
  template:
    metadata:
      labels:
        app: prefect-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: "prefect"
        - name: POSTGRES_PASSWORD
          value: "prefect"
        - name: POSTGRES_DB
          value: "prefect"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: prefect-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-postgres
  namespace: prefect
  labels:
    app: prefect-postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: prefect-postgres
