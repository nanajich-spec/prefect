apiVersion: v1
kind: ServiceAccount
metadata:
  name: prefect
  namespace: prefect
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prefect-role
  namespace: prefect
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prefect-rolebinding
  namespace: prefect
subjects:
- kind: ServiceAccount
  name: prefect
  namespace: prefect
roleRef:
  kind: Role
  name: prefect-role
  apiGroup: rbac.authorization.k8s.io
