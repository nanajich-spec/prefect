apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  namespace: prefect
spec:
  selector:
    app: prefect-server
  ports:
  - port: 4200
    targetPort: 4200
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: prefect
  labels:
    app: prefect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h prefect-postgres -p 5432 -U prefect; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: prefect-server
        image: prefecthq/prefect:2.20.25-python3.10
        command:
        - prefect
        - server
        - start
        - --host
        - "0.0.0.0"
        env:
        - name: PREFECT_SERVER_API_HOST
          value: "0.0.0.0"
        - name: PREFECT_SERVER_API_PORT
          value: "4200"
        - name: PREFECT_API_DATABASE_CONNECTION_URL
          value: "postgresql+asyncpg://prefect:prefect123@prefect-postgres:5432/prefect"
        - name: PREFECT_SERVER_ANALYTICS_ENABLED
          value: "false"
        - name: PREFECT_LOGGING_LEVEL
          value: "INFO"
        ports:
        - containerPort: 4200
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 10
          periodSeconds: 5
